<script>
  let turn = 1;
  let money = 100;
  let people = 1000;
  let tourist = 100;
  let exportMoney = 0;
  let happy = 50;
  let brand = 10;
  let gameOver = false;

  function action(type) {
    if (gameOver) return;

    let message = "";

    if (type === "festival") {
      money -= 20;
      tourist += 50;
      brand += 15;
      happy += 5;
      message = "도시 축제를 개최했습니다! 관광객과 인지도가 상승했습니다.";
    }

    else if (type === "marketing") {
      money -= 30;
      tourist += 30;
      exportMoney += 40;
      brand += 20;
      message = "해외 마케팅을 진행했습니다! 도시 브랜드가 알려졌습니다.";
    }

    else if (type === "education") {
      money -= 20;
      people += 100;
      happy += 20;
      message = "교육 시설에 투자했습니다! 인구와 만족도가 증가했습니다.";
    }

    else if (type === "sports") {
      money -= 40;
      tourist += 20;
      happy += 20;
      brand += 25;

      let win = Math.random() < 0.5;
      if (win) {
        tourist += 50;
        brand += 20;
        message = "스포츠팀을 창단했습니다! 첫 경기에서 우승해 도시가 유명해졌습니다!";
      } else {
        happy -= 10;
        message = "스포츠팀을 창단했지만 첫 경기에서 패배했습니다. 그래도 인지도는 올랐습니다.";
      }
    }

    else if (type === "eco") {
      money -= 25;
      happy += 15;
      brand += 10;
      tourist += 10;
      message = "친환경 정책을 시행했습니다! 시민 만족도와 도시 이미지가 좋아졌습니다.";
    }

    else if (type === "trade") {
      money -= 35;

      let success = Math.random() < 0.7;
      if (success) {
        exportMoney += 60;
        brand += 10;
        message = "무역 협정 체결에 성공했습니다! 수출액이 크게 증가했습니다.";
      } else {
        money -= 10;
        message = "무역 협정 체결에 실패했습니다. 추가 비용이 발생했습니다.";
      }
    }

    let eventMessage = randomEvent();

    turn++;

    updateScreen(message + eventMessage);
    checkGame();
  }

  function randomEvent() {
    let eventChance = Math.random();

    if (eventChance < 0.2) {
      tourist += 40;
      brand += 15;
      return "<br>📱 SNS에서 도시가 화제가 되었습니다!";
    } 
    else if (eventChance < 0.35) {
      people -= 100;
      happy -= 10;
      return "<br>⚠️ 청년층 일부가 도시를 떠났습니다.";
    }

    return "";
  }

  function updateScreen(message) {
    document.getElementById("turn").innerText = turn;
    document.getElementById("money").innerText = money;
    document.getElementById("people").innerText = people;
    document.getElementById("tourist").innerText = tourist;
    document.getElementById("export").innerText = exportMoney;
    document.getElementById("happy").innerText = happy;
    document.getElementById("brand").innerText = brand;
    document.getElementById("message").innerHTML = message;
  }

  function checkGame() {
    if (money <= 0 || happy <= 20) {
      document.getElementById("message").innerText = "게임 실패! 예산이 부족하거나 시민 만족도가 너무 낮습니다.";
      gameOver = true;
      return;
    }

    if (turn > 10) {
      let score = 0;

      if (people >= 2000) score++;
      if (tourist >= 500) score++;
      if (exportMoney >= 300) score++;
      if (happy >= 80) score++;
      if (brand >= 70) score++;

      if (score >= 3) {
        document.getElementById("message").innerText = "게임 성공! 도시가 글로벌 브랜드 도시로 성장했습니다!";
      } else {
        document.getElementById("message").innerText = "게임 종료! 아직 도시 성장 목표를 충분히 달성하지 못했습니다.";
      }

      gameOver = true;
    }
  }
</script>
