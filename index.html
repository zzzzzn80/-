<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 도시 키우기</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
    padding: 20px;
}

.game {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

.stats {
    text-align: left;
    margin: 20px auto;
    width: fit-content;
}

#message {
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="game">
    <h1>🌆 글로벌 도시 키우기</h1>
    <p>10턴 안에 도시를 성장시켜 보세요!</p>

    <div class="stats">
        <p>턴: <span id="turn">1</span> / 10</p>
        <p>예산: <span id="money">100</span></p>
        <p>인구: <span id="people">1000</span></p>
        <p>관광객: <span id="tourist">100</span></p>
        <p>수출액: <span id="export">0</span></p>
        <p>만족도: <span id="happy">50</span></p>
        <p>인지도: <span id="brand">10</span></p>
    </div>

    <button onclick="action('festival')">🎉 도시 축제 개최</button>
    <button onclick="action('marketing')">📱 해외 마케팅</button>
    <button onclick="action('education')">🏫 교육 시설 투자</button>
    <button onclick="action('sports')">⚽ 스포츠팀 창단</button>
    <button onclick="action('eco')">🌳 친환경 정책</button>
    <button onclick="action('trade')">🤝 무역 협정 체결</button>

    <p id="message"></p>
</div>

<script>
let turn = 1;
let money = 100;
let people = 1000;
let tourist = 100;
let exportMoney = 0;
let happy = 50;
let brand = 10;
let gameOver = false;

function action(type) {
    if (gameOver) return;

    let message = "";

    if (type === "festival") {
        money += 20;
        tourist += 50;
        brand += 15;
        happy += 5;
        message = "도시 축제를 개최했습니다!";
    }

    else if (type === "marketing") {
        money -= 30;
        tourist += 30;
        exportMoney += 40;
        brand += 20;
        message = "해외 마케팅을 진행했습니다!";
    }

    else if (type === "education") {
        money -= 20;
        people += 100;
        happy += 20;
        message = "교육 시설에 투자했습니다!";
    }

    else if (type === "sports") {
        money -= 40;
        tourist += 20;
        happy += 20;
        brand += 25;

        if (Math.random() < 0.5) {
            money += 30;
            tourist += 50;
            brand += 20;
            message = "스포츠팀이 우승했습니다!";
        } else {
            happy -= 10;
            message = "스포츠팀이 패배했습니다.";
        }
    }

    else if (type === "eco") {
        money -= 25;
        happy += 15;
        brand += 10;
        tourist += 10;
        message = "친환경 정책을 시행했습니다!";
    }

    else if (type === "trade") {
        money -= 35;

        if (Math.random() < 0.7) {
            exportMoney += 60;
            brand += 10;
            message = "무역 협정 체결 성공!";
        } else {
            money -= 10;
            message = "무역 협정 체결 실패!";
        }
    }

    let eventMessage = randomEvent();

    turn++;

    updateScreen(message + eventMessage);
    checkGame();
}

function randomEvent() {
    let eventChance = Math.random();

    if (eventChance < 0.2) {
        tourist += 40;
        brand += 15;
        return "<br>📱 SNS에서 도시가 화제가 되었습니다!";
    }

    if (eventChance < 0.35) {
        people -= 100;
        happy -= 10;
        return "<br>⚠️ 청년층 일부가 도시를 떠났습니다!";
    }

    return "";
}

function updateScreen(message) {
    document.getElementById("turn").innerText = turn;
    document.getElementById("money").innerText = money;
    document.getElementById("people").innerText = people;
    document.getElementById("tourist").innerText = tourist;
    document.getElementById("export").innerText = exportMoney;
    document.getElementById("happy").innerText = happy;
    document.getElementById("brand").innerText = brand;
    document.getElementById("message").innerHTML = message;
}

function checkGame() {
    if (money <= 0 || happy <= 20) {
        document.getElementById("message").innerText =
            "게임 실패! 예산 또는 만족도가 부족합니다.";
        gameOver = true;
        return;
    }

    if (turn > 10) {
        let score = 0;

        if (people >= 2000) score++;
        if (tourist >= 500) score++;
        if (exportMoney >= 300) score++;
        if (happy >= 80) score++;
        if (brand >= 70) score++;

        if (score >= 3) {
            document.getElementById("message").innerText =
                "🎉 게임 성공! 글로벌 도시로 성장했습니다!";
        } else {
            document.getElementById("message").innerText =
                "😢 게임 종료! 목표 달성 실패!";
        }

        gameOver = true;
    }
}
</script>

</body>
</html>
